version: '3.8'

services:
  db:
    image: postgres:15
    container_name: rails_postgres
    environment:
      POSTGRES_DB: rails_app_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rails_network

  web:
    build: .
    container_name: rails_app
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/rails_app_development
      RAILS_ENV: development
    networks:
      - rails_network

volumes:
  postgres_data:

networks:
  rails_network:
    driver: bridge
